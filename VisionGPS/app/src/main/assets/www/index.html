<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VISION GPS — أكواد المساحة</title>
<style>
/* offline */

:root {
  --bg:#080d18; --surface:#0f1729; --card:#131e30; --card-hover:#1a2840;
  --border:#1c2e48; --border-bright:#253d5a;
  --accent:#f59e0b; --accent-dim:rgba(245,158,11,.15);
  --accent2:#3b82f6; --accent2-dim:rgba(59,130,246,.15);
  --green:#10b981; --green-dim:rgba(16,185,129,.15);
  --text:#e2e8f0; --text-mid:#94a3b8; --muted:#4b6280;
  --shadow:0 4px 20px rgba(0,0,0,.5);
  --radius:14px; --t:.2s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#eef2f7; --surface:#fff; --card:#fff; --card-hover:#f1f5fb;
  --border:#d1dbe8; --border-bright:#b8c8dc;
  --accent:#d97706; --accent-dim:rgba(217,119,6,.12);
  --accent2:#2563eb; --accent2-dim:rgba(37,99,235,.12);
  --green:#059669; --green-dim:rgba(5,150,105,.12);
  --text:#1e293b; --text-mid:#475569; --muted:#94a3b8;
  --shadow:0 4px 20px rgba(0,0,0,.1);
}
[data-theme="outdoor"]{
  --bg:#0d1200; --surface:#161900; --card:#1d2100; --card-hover:#252800;
  --border:#3a3d00; --border-bright:#5a5e00;
  --accent:#e6ff00; --accent-dim:rgba(230,255,0,.12);
  --accent2:#00e676; --accent2-dim:rgba(0,230,118,.12);
  --green:#69ff47; --green-dim:rgba(105,255,71,.12);
  --text:#f5ffd0; --text-mid:#c5d88a; --muted:#7a8a40;
  --shadow:0 4px 20px rgba(0,0,0,.7);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background var(--t),color var(--t)}

#app{display:flex;flex-direction:column;height:100dvh;height:100vh;max-width:900px;margin:0 auto}

/* HEADER */
#header{background:var(--surface);border-bottom:2.5px solid var(--accent);padding:12px 16px;flex-shrink:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-svg{width:38px;height:38px;filter:drop-shadow(0 0 8px var(--accent));animation:pulse-glow 3s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{filter:drop-shadow(0 0 6px var(--accent))}50%{filter:drop-shadow(0 0 16px var(--accent))}}
.logo-name{font-family:monospace;font-size:17px;font-weight:700;color:var(--accent);letter-spacing:3px;line-height:1}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px}
.header-actions{display:flex;align-items:center;gap:8px}
.theme-group{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:3px;border:1px solid var(--border)}
.theme-btn{background:transparent;border:none;border-radius:7px;width:32px;height:28px;cursor:pointer;font-size:15px;transition:background var(--t),transform var(--t);display:flex;align-items:center;justify-content:center}
.theme-btn:hover{transform:scale(1.15)}
.theme-btn.active{background:var(--accent)}
.fav-toggle-btn{background:var(--card);border:1.5px solid var(--border);border-radius:8px;color:var(--text-mid);padding:5px 10px;font-size:12px;cursor:pointer;transition:all var(--t);font-family:Tahoma,Arial,sans-serif;white-space:nowrap}
.fav-toggle-btn:hover,.fav-toggle-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* SEARCH */
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:0 12px;transition:border-color var(--t)}
.search-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.search-icon{font-size:16px;flex-shrink:0}
#searchInput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:Tahoma,Arial,sans-serif;padding:11px 0;direction:rtl}
#searchInput::placeholder{color:var(--muted)}
.clear-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;border-radius:4px;transition:color var(--t);display:none}
.clear-btn:hover{color:var(--text)}
.clear-btn.show{display:flex;align-items:center}

/* FILTER BAR */
#filterBar{background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;overflow-y:hidden;flex-shrink:0;scrollbar-width:none;padding:8px 12px;display:flex;gap:7px;scroll-snap-type:x mandatory}
#filterBar::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;background:var(--card);border:1.5px solid var(--border);color:var(--text-mid);padding:5px 12px;border-radius:20px;font-size:12px;font-family:Tahoma,Arial,sans-serif;font-weight:600;cursor:pointer;transition:all var(--t);white-space:nowrap;scroll-snap-align:start;display:flex;align-items:center;gap:6px}
.filter-chip svg{width:16px;height:16px;flex-shrink:0}
.filter-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.filter-chip .count{background:rgba(0,0,0,.2);border-radius:10px;padding:0 6px;font-size:10px;font-family:monospace}
.filter-chip.active .count{background:rgba(0,0,0,.3)}

/* RESULTS BAR */
#resultsBar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.results-text{font-size:12px;color:var(--muted)}
.results-count{color:var(--accent);font-weight:700;font-family:monospace}
.type-legend{display:flex;gap:10px;align-items:center}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* CARDS */
#cardsContainer{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#cardsContainer::-webkit-scrollbar{width:5px}
#cardsContainer::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:10px}
#cardsGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

.code-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;position:relative;overflow:hidden;transition:transform var(--t),border-color var(--t),background var(--t),box-shadow var(--t);animation:fadeInUp .3s ease both}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.code-card:hover{transform:translateY(-2px);background:var(--card-hover);border-color:var(--accent);box-shadow:0 6px 24px rgba(0,0,0,.3),0 0 0 1px var(--accent-dim)}
.code-card:active{transform:scale(.97)}
.code-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.03) 100%);pointer-events:none}

.card-type-dot{position:absolute;top:10px;left:10px;width:8px;height:8px;border-radius:50%}
.card-fav-btn{position:absolute;top:6px;right:6px;background:none;border:none;font-size:14px;cursor:pointer;opacity:0;transition:opacity var(--t),transform var(--t);z-index:2;padding:4px;border-radius:6px}
.code-card:hover .card-fav-btn{opacity:1}
.card-fav-btn.active{opacity:1!important}
.card-fav-btn:hover{transform:scale(1.3)}

/* SVG ICON container on card */
.card-icon-wrap{width:44px;height:44px;margin-bottom:6px;display:flex;align-items:center;justify-content:center}
.card-icon-wrap svg{width:44px;height:44px}

.card-code{font-family:monospace;font-size:20px;font-weight:700;color:var(--accent);line-height:1;margin-bottom:4px;display:block}
.card-name{font-size:11px;line-height:1.4;font-weight:600;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-cat{display:inline-block;margin-top:8px;font-size:10px;background:var(--bg);color:var(--text-mid);border-radius:6px;padding:2px 7px}
.card-type-label{position:absolute;bottom:8px;left:10px;font-family:monospace;font-size:9px;font-weight:700}

/* EMPTY */
#emptyState{display:none;text-align:center;padding:60px 20px}
#emptyState.show{display:block}
.empty-icon{font-size:52px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--muted)}

/* MODAL */
#modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,0);display:flex;align-items:flex-end;justify-content:center;z-index:1000;pointer-events:none;transition:background .3s ease}
#modalOverlay.open{background:rgba(0,0,0,.82);pointer-events:all}
#modal{background:var(--surface);border:1.5px solid var(--border-bright);border-bottom:none;border-radius:24px 24px 0 0;padding:20px 22px 36px;width:100%;max-width:900px;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);max-height:90vh;overflow-y:auto}
#modal.open{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--border-bright);border-radius:2px;margin:0 auto 20px}

/* Big SVG icon in modal */
.modal-icon-wrap{display:flex;justify-content:center;margin-bottom:10px}
.modal-icon-wrap svg{width:80px;height:80px;filter:drop-shadow(0 4px 14px rgba(0,0,0,.4))}

.modal-code{font-family:monospace;font-size:48px;font-weight:700;color:var(--accent);text-align:center;display:block;line-height:1;margin-bottom:10px;text-shadow:0 0 20px var(--accent-dim)}
.modal-name{font-size:16px;font-weight:700;text-align:center;color:var(--text);margin-bottom:20px;line-height:1.5}
.modal-details{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.detail-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.detail-label{font-size:11px;color:var(--muted);margin-bottom:5px;display:block}
.detail-value{font-size:14px;font-weight:700;color:var(--accent2)}
.modal-actions{display:flex;flex-direction:column;gap:8px}
.btn-copy{width:100%;background:var(--accent);border:none;border-radius:14px;padding:15px;font-family:Tahoma,Arial,sans-serif;font-size:16px;font-weight:700;color:#000;cursor:pointer;transition:all var(--t)}
.btn-copy:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-copy.copied{background:var(--green)}
.btn-fav{width:100%;background:transparent;border:1.5px solid var(--border-bright);border-radius:14px;padding:12px;font-family:Tahoma,Arial,sans-serif;font-size:14px;font-weight:600;color:var(--text-mid);cursor:pointer;transition:all var(--t)}
.btn-fav:hover,.btn-fav.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.btn-close{width:100%;background:transparent;border:1.5px solid var(--border);border-radius:14px;padding:11px;font-family:Tahoma,Arial,sans-serif;font-size:14px;color:var(--muted);cursor:pointer;transition:all var(--t)}
.btn-close:hover{border-color:var(--border-bright);color:var(--text-mid)}

/* RECENT BAR */
#recentBar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 12px;display:none;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
#recentBar.show{display:flex}
#recentBar::-webkit-scrollbar{display:none}
.recent-label{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap;margin-left:4px}
.recent-chip{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px 9px;font-family:monospace;font-size:11px;font-weight:700;color:var(--accent);cursor:pointer;transition:all var(--t);white-space:nowrap;flex-shrink:0}
.recent-chip:hover{border-color:var(--accent);background:var(--accent-dim)}

/* STATS */
#statsOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;padding:20px}
#statsOverlay.open{display:flex}
#statsPanel{background:var(--surface);border:1.5px solid var(--border-bright);border-radius:20px;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:fadeInUp .3s ease}
.stats-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.stats-title{font-size:17px;font-weight:700;color:var(--accent)}
.stats-close{background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:18px;cursor:pointer;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.stats-close:hover{color:var(--text);border-color:var(--border-bright)}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-cat{font-size:13px;font-weight:600;display:flex;gap:6px;align-items:center;min-width:110px}
.stat-bar-wrap{flex:1;margin:0 12px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.stat-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .6s ease}
.stat-num{font-family:monospace;font-size:13px;font-weight:700;color:var(--accent);min-width:30px;text-align:left}

/* FLOATING BUTTONS */
#statsBtn{position:fixed;bottom:18px;left:18px;background:var(--accent);color:#000;border:none;border-radius:50px;padding:10px 16px;font-family:Tahoma,Arial,sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 4px 16px rgba(245,158,11,.4);transition:all var(--t);z-index:100}
#statsBtn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(245,158,11,.5)}
#scrollTop{position:fixed;bottom:18px;right:18px;background:var(--card);border:1.5px solid var(--border-bright);color:var(--text-mid);border-radius:50%;width:40px;height:40px;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all var(--t);z-index:100;box-shadow:var(--shadow)}
#scrollTop.show{display:flex}
#scrollTop:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;padding:10px 20px;border-radius:50px;font-size:13px;font-weight:700;font-family:Tahoma,Arial,sans-serif;opacity:0;transition:all .3s ease;pointer-events:none;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

mark{background:var(--accent-dim);color:var(--accent);border-radius:3px;padding:0 2px;font-weight:700}

@media(min-width:600px){#cardsGrid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:800px){#cardsGrid{grid-template-columns:repeat(4,1fr)};#modal{max-width:500px;border-radius:24px;margin-bottom:40px};#modalOverlay{align-items:center}}
@media(max-width:400px){.modal-code{font-size:38px};.logo-name{font-size:15px}}
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="header-top">
      <div class="logo">
        <!-- GPS Logo SVG -->
        <svg class="logo-svg" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="#f59e0b" stroke-width="2" fill="none"/>
          <circle cx="20" cy="20" r="12" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity=".6"/>
          <circle cx="20" cy="20" r="6" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity=".4"/>
          <line x1="2" y1="20" x2="38" y2="20" stroke="#f59e0b" stroke-width="1.5" opacity=".5"/>
          <line x1="20" y1="2" x2="20" y2="38" stroke="#f59e0b" stroke-width="1.5" opacity=".5"/>
          <circle cx="20" cy="20" r="3" fill="#f59e0b"/>
          <path d="M20 10 L22 16 L20 14 L18 16 Z" fill="#f59e0b"/>
        </svg>
        <div>
          <div class="logo-name">VISION GPS</div>
          <div class="logo-sub">أكواد المساحة الهندسية</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="fav-toggle-btn" id="favToggle" onclick="toggleFavMode()">⭐ المفضلة</button>
        <div class="theme-group">
          <button class="theme-btn active" data-theme="dark" onclick="setTheme('dark')" title="ليلي">🌙</button>
          <button class="theme-btn" data-theme="light" onclick="setTheme('light')" title="نهاري">☀️</button>
          <button class="theme-btn" data-theme="outdoor" onclick="setTheme('outdoor')" title="خارجي">🌆</button>
        </div>
      </div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchInput" placeholder="ابحث بالكود أو الاسم… مثال: 280" autocomplete="off" inputmode="search">
      <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
  </header>

  <div id="recentBar"><span class="recent-label">🕐 الأخيرة:</span></div>
  <div id="filterBar"></div>
  <div id="resultsBar">
    <span class="results-text">النتائج: <span class="results-count" id="resultsCount">0</span></span>
    <div class="type-legend">
      <span class="legend-item"><span class="legend-dot" style="background:#10b981"></span>نقطة</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--accent2)"></span>خط</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>نقطة/خط</span>
    </div>
  </div>

  <div id="cardsContainer">
    <div id="cardsGrid"></div>
    <div id="emptyState">
      <div class="empty-icon">🔎</div>
      <div class="empty-title">لا توجد نتائج</div>
      <div class="empty-sub">جرّب كلمة أخرى أو تغيير التصنيف</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modalOverlay" onclick="handleOverlayClick(event)">
  <div id="modal">
    <div class="modal-handle"></div>
    <div class="modal-icon-wrap" id="modalIconWrap"></div>
    <span class="modal-code" id="modalCode"></span>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-details">
      <div class="detail-box">
        <span class="detail-label">نوع الكيان</span>
        <div class="detail-value" id="modalType"></div>
      </div>
      <div class="detail-box">
        <span class="detail-label">التصنيف</span>
        <div class="detail-value" id="modalCat" style="font-size:12px"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-copy" id="copyBtn" onclick="copyCode()">📋 نسخ الكود</button>
      <button class="btn-fav" id="modalFavBtn" onclick="toggleFav()">⭐ إضافة للمفضلة</button>
      <button class="btn-close" onclick="closeModal()">✖ إغلاق</button>
    </div>
  </div>
</div>

<!-- STATS -->
<div id="statsOverlay" onclick="closeStats(event)">
  <div id="statsPanel">
    <div class="stats-header">
      <span class="stats-title">📊 إحصائيات الأكواد</span>
      <button class="stats-close" onclick="closeStatsPanel()">✕</button>
    </div>
    <div id="statsContent"></div>
  </div>
</div>

<button id="statsBtn" onclick="openStats()">📊 الإحصائيات</button>
<button id="scrollTop" onclick="scrollToTop()">↑</button>
<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════════
   SVG ICON LIBRARY — Realistic Engineering Symbols
══════════════════════════════════════════════════ */
const SVG_ICONS = {

  /* ── MANHOLES ─────────────────────────────────── */
  manhole_round: (color='#6b7280') => `<svg viewBox="0 0 44 44">
    <defs><radialGradient id="rg1" cx="40%" cy="35%"><stop offset="0%" stop-color="#9ca3af"/><stop offset="100%" stop-color="${color}"/></radialGradient></defs>
    <circle cx="22" cy="22" r="20" fill="#374151" stroke="#1f2937" stroke-width="1"/>
    <circle cx="22" cy="22" r="18" fill="url(#rg1)" stroke="#4b5563" stroke-width="1"/>
    <circle cx="22" cy="22" r="15" fill="${color}" stroke="#4b5563" stroke-width=".8"/>
    <line x1="7" y1="22" x2="37" y2="22" stroke="#374151" stroke-width="1.8"/>
    <line x1="22" y1="7" x2="22" y2="37" stroke="#374151" stroke-width="1.8"/>
    <circle cx="22" cy="22" r="10" fill="none" stroke="#374151" stroke-width="1.2"/>
    <circle cx="22" cy="22" r="5" fill="none" stroke="#374151" stroke-width="1"/>
    <ellipse cx="22" cy="15" rx="3.5" ry="1.5" fill="#374151" opacity=".8"/>
    <ellipse cx="22" cy="29" rx="3.5" ry="1.5" fill="#374151" opacity=".8"/>
    <circle cx="22" cy="22" r="2" fill="#1f2937"/>
  </svg>`,

  manhole_rect: (color='#6b7280') => `<svg viewBox="0 0 44 44">
    <rect x="4" y="8" width="36" height="28" rx="2" fill="#374151" stroke="#1f2937" stroke-width="1"/>
    <rect x="6" y="10" width="32" height="24" rx="1.5" fill="${color}" stroke="#4b5563" stroke-width=".8"/>

/* Helper color functions */
function lighten(hex, amount=40){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+amount)},${Math.min(255,g+amount)},${Math.min(255,b+amount)})`;
}
function darken(hex,amount=30){
  try{
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.max(0,r-amount)},${Math.max(0,g-amount)},${Math.max(0,b-amount)})`;
  }catch(e){return hex;}
}

/* ══════════════════════════════════════════════════
   MAP CODE → SVG icon function
══════════════════════════════════════════════════ */
function getIcon(name, cat, code='') {
  const n = name.toLowerCase();
  const c = (code||'').toLowerCase();

  /* --- Manholes --- */
  if (n.includes('manhole')) {
    const colorMap = {
      'irrigation':'#6ee7b7','brackish':'#93c5fd','gas':'#fde68a',
      'fresh water':'#60a5fa','circular':'#9ca3af','general':'#9ca3af',
      'rectangular':'#6b7280','telephone':'#a5b4fc','electric':'#fcd34d',
      'sewerage':'#a3a3a3','storm':'#7dd3fc'
    };
    let col = '#6b7280';
    for(const [k,v] of Object.entries(colorMap)) if(n.includes(k)) {col=v;break;}
    if(n.includes('round') || n.includes('circular')) return SVG_ICONS.manhole_round(col);
    return (n.includes('rectangular')||n.includes('general')) ? SVG_ICONS.manhole_rect(col) : SVG_ICONS.manhole_round(col);
  }

  /* --- Pipelines above ground --- */
  if (n.includes('pipeline') && n.includes('above')) {
    if(n.includes('oil')) return SVG_ICONS.pipeline_above('#1f2937');
    if(n.includes('gas')) return SVG_ICONS.pipeline_above('#fde68a');
    if(n.includes('water')) return SVG_ICONS.pipeline_above('#60a5fa');
    if(n.includes('sewage')) return SVG_ICONS.pipeline_above('#a3a3a3');
    if(n.includes('storm')) return SVG_ICONS.pipeline_above('#7dd3fc');
    if(n.includes('diesel')) return SVG_ICONS.pipeline_above('#f97316');
    if(n.includes('brackish')) return SVG_ICONS.pipeline_above('#818cf8');
    return SVG_ICONS.pipeline_above('#6b7280');
  }

  /* --- Pipelines buried --- */
  if ((n.includes('pipeline') && n.includes('buried')) || n.includes('pipeline, buried') || n.includes('pipeline, major, buried')) {
    if(n.includes('oil')) return SVG_ICONS.pipeline_buried('#374151');
    if(n.includes('gas')) return SVG_ICONS.pipeline_buried('#fde68a');
    if(n.includes('water')) return SVG_ICONS.pipeline_buried('#3b82f6');
    if(n.includes('sewage')) return SVG_ICONS.pipeline_buried('#9ca3af');
    if(n.includes('storm')) return SVG_ICONS.pipeline_buried('#7dd3fc');
    if(n.includes('diesel')) return SVG_ICONS.pipeline_buried('#fb923c');
    return SVG_ICONS.pipeline_buried('#6b7280');
  }
  if (n.includes('pipeline buried undefined') || n.includes('pipeline above ground undefined')) return SVG_ICONS.pipeline_above('#6b7280');

  /* --- Flowlines above ground --- */
  if (n.includes('flowline') && n.includes('above')) {
    if(n.includes('oil')) return SVG_ICONS.flowline('#374151');
    if(n.includes('gas') || n.includes('fuel gas')) return SVG_ICONS.flowline('#fde68a');
    if(n.includes('water')) return SVG_ICONS.flowline('#3b82f6');
    if(n.includes('fire')) return SVG_ICONS.flowline('#ef4444');
    if(n.includes('drain')) return SVG_ICONS.flowline('#9ca3af');
    if(n.includes('condensate')) return SVG_ICONS.flowline('#d97706');
    if(n.includes('salt')) return SVG_ICONS.flowline('#818cf8');
    return SVG_ICONS.flowline('#3b82f6');
  }

  /* --- Flowlines buried --- */
  if (n.includes('flowline') && n.includes('buried')) {
    if(n.includes('oil')) return SVG_ICONS.pipeline_buried('#1f2937');
    if(n.includes('gas') || n.includes('fuel gas')) return SVG_ICONS.pipeline_buried('#fde68a');
    if(n.includes('water')) return SVG_ICONS.pipeline_buried('#60a5fa');
    if(n.includes('fire')) return SVG_ICONS.pipeline_buried('#ef4444');
    if(n.includes('drain')) return SVG_ICONS.pipeline_buried('#9ca3af');
    if(n.includes('condensate')) return SVG_ICONS.pipeline_buried('#d97706');
    if(n.includes('salt')) return SVG_ICONS.pipeline_buried('#818cf8');
    return SVG_ICONS.pipeline_buried('#4b5563');
  }

  /* --- Cables buried --- */
  if (n.includes('cable') && n.includes('buried')) {
    if(n.includes('electric') && n.includes('ht')) return SVG_ICONS.cable_buried('#ef4444');
    if(n.includes('electric') && n.includes('lt')) return SVG_ICONS.cable_buried('#f97316');
    if(n.includes('telephone')) return SVG_ICONS.cable_buried('#a5b4fc');
    if(n.includes('fibre') || n.includes('fiber')) return SVG_ICONS.cable_buried('#f59e0b');
    if(n.includes('cathodic') || n.includes('earthing') || n.includes('earth')) return SVG_ICONS.cable_buried('#10b981');
    if(n.includes('instrumentation') || n.includes('control')) return SVG_ICONS.cable_buried('#e879f9');
    return SVG_ICONS.cable_buried('#9ca3af');
  }

  /* --- Cables above ground --- */
  if (n.includes('cable') && n.includes('above')) {
    if(n.includes('electric') && n.includes('ht')) return SVG_ICONS.pipeline_above('#ef4444');
    if(n.includes('electric') && n.includes('lt')) return SVG_ICONS.pipeline_above('#f97316');
    if(n.includes('telephone')) return SVG_ICONS.pipeline_above('#a5b4fc');
    return SVG_ICONS.pipeline_above('#9ca3af');
  }

  /* --- Electric overhead lines --- */
  if (n.includes('overhead') || n.includes('over head') || n.includes('transmission line')) return SVG_ICONS.pylon();

  /* --- Junction boxes --- */
  if (n.includes('junction box')) {
    if(n.includes('telephone')) return SVG_ICONS.junction_box('#a5b4fc');
    if(n.includes('electrical') || n.includes('electric')) return SVG_ICONS.junction_box('#fcd34d');
    return SVG_ICONS.junction_box('#f59e0b');
  }

  /* --- Trees & Vegetation --- */
  if (n.includes('palm') || n.includes('coconut')) return SVG_ICONS.palm_tree();
  if (n.includes('line of trees')) return SVG_ICONS.vegetation();
  if (n.includes('tree') && n.includes('large')) return SVG_ICONS.tree_general('L');
  if (n.includes('tree') && n.includes('small')) return SVG_ICONS.tree_general('S');
  if (n.includes('tree')) return SVG_ICONS.tree_general('M');
  if (n.includes('vegetation') || n.includes('landscape')) return SVG_ICONS.vegetation();

  /* --- Roads --- */
  if (n.includes('asphalt') || n.includes('aggregate road') || n.includes('rig road')) return SVG_ICONS.road_asphalt();
  if (n.includes('bridge') || n.includes('steel bridge')) return SVG_ICONS.bridge();
  if (n.includes('kerb') || n.includes('curb')) return SVG_ICONS.kerb();
  if (n.includes('foot path')) return SVG_ICONS.foot_path();
  if (n.includes('retaining wall')) return SVG_ICONS.wall();
  if (n.includes('road, centreline') || n.includes('pavement') || n.includes('tiled') || n.includes('paving')) return SVG_ICONS.road_asphalt();
  if (n.includes('wadi')) return SVG_ICONS.drain();
  if (n.includes('track') || n.includes('rail')) return SVG_ICONS.road_asphalt();
  if (n.includes('apron')) return SVG_ICONS.road_asphalt();

  /* --- Boundaries / Fences --- */
  if (n.includes('chain link')) return SVG_ICONS.chain_link_fence();
  if (n.includes('barbed wire')) return SVG_ICONS.barbed_wire();
  if (n.includes('wood fence') || n.includes('sheet fence')) return SVG_ICONS.wall();
  if (n.includes('wall') || n.includes('barrier') || n.includes('bund')) return SVG_ICONS.wall();
  if (n.includes('bollard')) return SVG_ICONS.bollard();
  if (n.includes('boundary')) return SVG_ICONS.wall();

  /* --- Geotechnical --- */
  if (n.includes('borehole') || n.includes('cross hole')) return SVG_ICONS.borehole();
  if (n.includes('pit') || n.includes('trail pit') || n.includes('test')) return SVG_ICONS.trench();
  if (n.includes('cone penetration')) return SVG_ICONS.borehole();
  if (n.includes('density') || n.includes('bearing') || n.includes('resistivity') || n.includes('permeability') || n.includes('thermal') || n.includes('plate load') || n.includes('geo tech')) return SVG_ICONS.borehole();

  /* --- Land --- */
  if (n.includes('bank') || n.includes('slope')) return SVG_ICONS.slope();
  if (n.includes('pit, general')) return SVG_ICONS.trench();
  if (n.includes('spot height') || n.includes('finish floor')) return SVG_ICONS.spot_height();
  if (n.includes('change of surface')) return SVG_ICONS.road_asphalt();

  /* --- Survey --- */
  if (n.includes('survey control') || n.includes('control, qc')) return SVG_ICONS.survey_control();
  if (n.includes('stake') || n.includes('reference')) return SVG_ICONS.survey_stake();

  /* --- Services --- */
  if (n.includes('flag post')) return SVG_ICONS.flag_post();
  if (n.includes('camera')) return SVG_ICONS.camera_post();
  if (n.includes('traffic signal') || n.includes('traffic light')) return SVG_ICONS.traffic_light();
  if (n.includes('fire hydrant')) return SVG_ICONS.fire_hydrant();
  if (n.includes('fire box') || n.includes('fire alarm')) return SVG_ICONS.fire_box();
  if (n.includes('lamp post') || n.includes('garden light') || n.includes('flood light') || n.includes('warning light')) return SVG_ICONS.lamp_post();
  if (n.includes('electric') || n.includes('electricity')) return SVG_ICONS.electric_pole();
  if (n.includes('wood pole electric')) return SVG_ICONS.electric_pole();
  if (n.includes('pylon')) return SVG_ICONS.pylon();
  if (n.includes('telephone pole') || n.includes('wood pole telephone')) return SVG_ICONS.telephone_pole();
  if (n.includes('road sign') || n.includes('sign post') || n.includes('advertisement') || n.includes('mirror post')) return SVG_ICONS.road_sign();
  if (n.includes('valve')) return SVG_ICONS.valve();
  if (n.includes('water tap')) return SVG_ICONS.water_tap();
  if (n.includes('sprinkler')) return SVG_ICONS.water_tap();
  if (n.includes('generator')) return SVG_ICONS.generator();

function setTheme(t){
  state.theme=t;
  document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===t));
  saveState();
}

/* ══════════════════════════════════════════════════
   FILTERS
══════════════════════════════════════════════════ */
function buildFilters(){
  const cats=['الكل',...new Set(CODES.map(c=>c.cat))];
  const bar=document.getElementById('filterBar');
  bar.innerHTML='';
  const counts={};
  CODES.forEach(c=>counts[c.cat]=(counts[c.cat]||0)+1);
  cats.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='filter-chip'+(cat===state.category?' active':'');
    const n=cat==='الكل'?CODES.length:(counts[cat]||0);
    btn.innerHTML=`${CAT_ICONS[cat]||'📌'} ${cat} <span class="count">${n}</span>`;
    btn.onclick=()=>selectCategory(cat);
    bar.appendChild(btn);
  });
}
function selectCategory(cat){state.category=cat;buildFilters();renderCards();}

document.getElementById('searchInput').addEventListener('input',function(){
  state.search=this.value;
  document.getElementById('clearBtn').classList.toggle('show',this.value.length>0);
  renderCards();
});
function clearSearch(){state.search='';document.getElementById('searchInput').value='';document.getElementById('clearBtn').classList.remove('show');renderCards();}

/* ══════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════ */
function getFilteredData(){
  let data=CODES;
  if(state.showFavOnly) data=data.filter(c=>state.favorites.includes(c.code));
  if(state.category!=='الكل') data=data.filter(c=>c.cat===state.category);
  if(state.search.trim()){
    const q=state.search.toLowerCase().trim();
    data=data.filter(c=>c.code.toLowerCase().includes(q)||c.name.toLowerCase().includes(q)||c.cat.includes(q));
  }
  return data;
}
function highlight(text,query){
  if(!query.trim()) return text;
  return text.replace(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<mark>$1</mark>');
}
function typeColor(type){return type==='P'?'#10b981':type==='S'?'var(--accent2)':'var(--accent)';}

function renderCards(){
  const data=getFilteredData();
  const grid=document.getElementById('cardsGrid');
  const empty=document.getElementById('emptyState');
  const q=state.search.trim();
  document.getElementById('resultsCount').textContent=data.length;
  if(data.length===0){grid.innerHTML='';empty.classList.add('show');return;}
  empty.classList.remove('show');
  grid.innerHTML=data.map((item,i)=>{
    const isFav=state.favorites.includes(item.code);
    const svgIcon=getIcon(item.name,item.cat,item.code);
    return `<div class="code-card" style="animation-delay:${Math.min(i,10)*25}ms" onclick="openModal('${item.code}')">
      <div class="card-type-dot" style="background:${typeColor(item.type)}"></div>
      <button class="card-fav-btn ${isFav?'active':''}" onclick="event.stopPropagation();quickFav('${item.code}',this)">${isFav?'⭐':'☆'}</button>
      <div class="card-icon-wrap">${svgIcon}</div>
      <span class="card-code">${highlight(item.code,q)}</span>
      <div class="card-name">${highlight(item.name,q)}</div>
      <span class="card-cat">${CAT_ICONS[item.cat]||''} ${item.cat}</span>
      <span class="card-type-label" style="color:${typeColor(item.type)}">${item.type}</span>
    </div>`;
  }).join('');
}

function quickFav(code,btn){
  const idx=state.favorites.indexOf(code);
  if(idx>-1){state.favorites.splice(idx,1);btn.textContent='☆';btn.classList.remove('active');showToast('تمت الإزالة من المفضلة');}
  else{state.favorites.push(code);btn.textContent='⭐';btn.classList.add('active');showToast('تمت الإضافة للمفضلة ⭐');}
  saveState();
  if(state.showFavOnly) renderCards();
}
function toggleFavMode(){
  state.showFavOnly=!state.showFavOnly;
  const btn=document.getElementById('favToggle');
  btn.classList.toggle('active',state.showFavOnly);
  btn.textContent=state.showFavOnly?'⭐ الكل':'⭐ المفضلة';
  renderCards();
}

/* ══════════════════════════════════════════════════
   RECENTLY VIEWED
══════════════════════════════════════════════════ */
function addRecent(code){state.recent=[code,...state.recent.filter(c=>c!==code)].slice(0,8);saveState();renderRecent();}
function renderRecent(){
  const bar=document.getElementById('recentBar');
  if(state.recent.length===0){bar.classList.remove('show');return;}
  bar.classList.add('show');
  bar.innerHTML='<span class="recent-label">🕐 الأخيرة:</span>'+state.recent.map(c=>`<button class="recent-chip" onclick="openModal('${c}')">${c}</button>`).join('');
}

/* ══════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════ */
function openModal(code){
  const item=CODES.find(c=>c.code===code);if(!item)return;
  state.activeCode=code;addRecent(code);
  document.getElementById('modalIconWrap').innerHTML=getIcon(item.name,item.cat,item.code);
  document.getElementById('modalCode').textContent=item.code;
  document.getElementById('modalName').textContent=item.name;
  const typeMap={P:'🟢 نقطة (Point)',S:'🔵 خط (String)',PS:'🟡 نقطة / خط'};
  document.getElementById('modalType').textContent=typeMap[item.type]||item.type;
  document.getElementById('modalCat').textContent=(CAT_ICONS[item.cat]||'')+' '+item.cat;
  const isFav=state.favorites.includes(code);
  const fb=document.getElementById('modalFavBtn');
  fb.textContent=isFav?'⭐ إزالة من المفضلة':'☆ إضافة للمفضلة';
  fb.classList.toggle('active',isFav);
  const cb=document.getElementById('copyBtn');cb.textContent='📋 نسخ الكود';cb.classList.remove('copied');
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}
function handleOverlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function copyCode(){
  if(!state.activeCode)return;
  const btn=document.getElementById('copyBtn');
  const done=()=>{btn.textContent='✅ تم النسخ!';btn.classList.add('copied');showToast('تم نسخ الكود: '+state.activeCode);setTimeout(()=>{btn.textContent='📋 نسخ الكود';btn.classList.remove('copied');},2000);};
  if(navigator.clipboard) navigator.clipboard.writeText(state.activeCode).then(done).catch(()=>{fallback();});
  else fallback();
  function fallback(){const ta=document.createElement('textarea');ta.value=state.activeCode;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');done();}catch(e){}document.body.removeChild(ta);}
}
function toggleFav(){
  if(!state.activeCode)return;
  const idx=state.favorites.indexOf(state.activeCode);
  const btn=document.getElementById('modalFavBtn');
  if(idx>-1){state.favorites.splice(idx,1);btn.textContent='☆ إضافة للمفضلة';btn.classList.remove('active');showToast('تمت الإزالة');}
  else{state.favorites.push(state.activeCode);btn.textContent='⭐ إزالة من المفضلة';btn.classList.add('active');showToast('تمت الإضافة ⭐');}
  saveState();renderCards();
}

/* ══════════════════════════════════════════════════
   STATS
══════════════════════════════════════════════════ */
function openStats(){
  const cats=[...new Set(CODES.map(c=>c.cat))];
  const counts={};CODES.forEach(c=>counts[c.cat]=(counts[c.cat]||0)+1);
  const max=Math.max(...Object.values(counts));
  document.getElementById('statsContent').innerHTML=`
    <div class="stat-row"><span class="stat-cat">📋 الإجمالي</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:100%"></div></div><span class="stat-num">${CODES.length}</span></div>
    ${cats.map(cat=>`<div class="stat-row"><span class="stat-cat">${CAT_ICONS[cat]||'📌'} ${cat}</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:${(counts[cat]/max*100).toFixed(0)}%"></div></div><span class="stat-num">${counts[cat]}</span></div>`).join('')}
    <div class="stat-row" style="margin-top:8px"><span class="stat-cat">⭐ المفضلة</span><div class="stat-bar-wrap"><div class="stat-bar" style="width:${state.favorites.length>0?(state.favorites.length/CODES.length*100).toFixed(0)+'%':'3px'}"></div></div><span class="stat-num">${state.favorites.length}</span></div>`;
  document.getElementById('statsOverlay').classList.add('open');
}
function closeStats(e){if(e.target===document.getElementById('statsOverlay'))closeStatsPanel();}
function closeStatsPanel(){document.getElementById('statsOverlay').classList.remove('open');}

/* SCROLL */
const container=document.getElementById('cardsContainer');
container.addEventListener('scroll',function(){document.getElementById('scrollTop').classList.toggle('show',this.scrollTop>200);});
function scrollToTop(){container.scrollTo({top:0,behavior:'smooth'});}

/* TOAST */
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);}

/* KEYBOARD */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeStatsPanel();}
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();document.getElementById('searchInput').focus();}
});

/* SWIPE */
let ty=0;
document.getElementById('modal').addEventListener('touchstart',e=>{ty=e.touches[0].clientY;},{passive:true});
document.getElementById('modal').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-ty>80)closeModal();},{passive:true});

/* INIT */
loadState();setTheme(state.theme);buildFilters();renderCards();renderRecent();
</script>
 <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script> 
</body>
</html>
